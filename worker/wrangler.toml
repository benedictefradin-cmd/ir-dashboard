name = "ir-dashboard-api"
main = "index.js"
compatibility_date = "2024-01-01"

# KV Namespace partagé : sollicitations + calendrier + comptes utilisateurs (préfixe auth:)
[[kv_namespaces]]
binding = "CONTACT_SUBMISSIONS"
id = "539bcd0d0e2c43eda11a6994a3375880"

# Secrets à configurer avec : wrangler secret put <NOM>
#
# Brevo / Telegram :
# - BREVO_API_KEY
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHAT_ID
# - TELEGRAM_CHANNEL_ID
#
# Sollicitations (Bearer token back-office) :
# - CONTACT_AUTH_TOKEN  (déprécié — sera remplacé par sessions OAuth)
#
# GitHub — proxy serveur (jamais côté navigateur) :
# - GITHUB_PAT          PAT Fine-grained avec Contents: Read+Write sur le repo site
# - GITHUB_OWNER        Owner du repo site (ex: institut-rousseau ou benedictefradin-cmd)
# - GITHUB_SITE_REPO    Nom du repo site (ex: institut-rousseau)
#
# OAuth GitHub (dashboard login) :
# - GITHUB_OAUTH_CLIENT_ID      Client ID de l'OAuth App GitHub
# - GITHUB_OAUTH_CLIENT_SECRET  Client Secret de l'OAuth App GitHub
# - ALLOWED_GITHUB_USERS        Liste blanche d'usernames séparés par virgules
#
# Traduction (optionnel) :
# - DEEPL_API_KEY
# - ANTHROPIC_API_KEY
#
# Auth login/mdp (legacy — à retirer après bascule complète OAuth) :
# - Aucun secret requis. Comptes stockés dans CONTACT_SUBMISSIONS sous le préfixe
#   `auth:` (auth:user:*, auth:user_login:*, auth:session:*, auth:_users_index).
