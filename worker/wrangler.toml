name = "ir-dashboard-api"
main = "index.js"
compatibility_date = "2024-01-01"

# KV Namespace pour les sollicitations
[[kv_namespaces]]
binding = "CONTACT_SUBMISSIONS"
id = "REMPLACER_PAR_VOTRE_KV_NAMESPACE_ID"
# Créer le namespace : wrangler kv:namespace create "CONTACT_SUBMISSIONS"
# Puis remplacer l'id ci-dessus par l'ID retourné.

# Secrets à configurer avec : wrangler secret put <NOM>
# BREVO_API_KEY
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID
# TELEGRAM_CHANNEL_ID
# CONTACT_AUTH_TOKEN (Bearer token pour les endpoints back-office sollicitations)
