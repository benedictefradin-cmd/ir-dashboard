name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # Seul VITE_WORKER_URL est encore lu côté front. Les secrets GitHub
          # / Notion / Brevo vivent désormais uniquement comme secrets du Worker
          # Cloudflare (`wrangler secret put …`) — jamais inlinés dans le bundle
          # public, qui était une faille critique (cf. AUDIT §4.1).
          VITE_WORKER_URL: ${{ secrets.WORKER_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
